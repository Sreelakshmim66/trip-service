server.port=8082

spring.application.name=trip-service
spring.datasource.url=jdbc:h2:mem:tripdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

grpc.server.port=9092
grpc.client.user-service.address=discovery:///USER-SERVICE
grpc.client.user-service.negotiation-type=plaintext

app.jwt.secret=myVerySecretKeyForJWTSigningThatIsLongEnough123456||
